<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JMart — AI-powered desktop IDE</title>
	<meta name="description" content="Download JMart — an AI-powered desktop IDE with agents, code search, and tools that run locally.">
	<link rel="icon" type="image/png" href="jmart-logo.png">
	<style>
		:root {
			--bg: #0a0b14;
			--bg-card: #131523;
			--bg-card-hover: #1a1d2e;
			--border: #232639;
			--text: #f1f4f9;
			--text-muted: #8b8fa3;
			--accent: #6366f1;
			--accent-hover: #4f46e5;
			--accent-preview: #f59e0b;
			--accent-preview-hover: #d97706;
			--success: #10b981;
			--error: #ef4444;
		}
		@media (prefers-color-scheme: light) {
			:root {
				--bg: #f8fafc;
				--bg-card: #ffffff;
				--bg-card-hover: #f1f5f9;
				--border: #e2e8f0;
				--text: #0f172a;
				--text-muted: #64748b;
			}
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
			background: var(--bg);
			color: var(--text);
			line-height: 1.5;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}
		main {
			flex: 1;
			max-width: 960px;
			margin: 0 auto;
			padding: 4rem 1.5rem 6rem;
			width: 100%;
		}
		header {
			text-align: center;
			margin-bottom: 4rem;
		}
		.logo {
			width: 96px;
			height: 96px;
			border-radius: 22px;
			display: block;
			margin: 0 auto 1.5rem;
			object-fit: cover;
			box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
			background: var(--bg-card);
			border: 1px solid var(--border);
		}
		h1 {
			font-size: 3rem;
			margin: 0 0 0.5rem;
			letter-spacing: -0.02em;
			font-weight: 700;
		}
		.tagline {
			font-size: 1.25rem;
			color: var(--text-muted);
			margin: 0;
		}
		.channels {
			display: grid;
			gap: 1.5rem;
			grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
			max-width: 520px;
			margin: 0 auto 3rem;
		}
		.channel {
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 2rem;
			transition: background 0.15s, transform 0.15s, border-color 0.15s;
			display: flex;
			flex-direction: column;
		}
		.channel:hover {
			background: var(--bg-card-hover);
			transform: translateY(-2px);
		}
		.channel.release { border-top: 3px solid var(--accent); }
		.channel.preview { border-top: 3px solid var(--accent-preview); }
		.channel h2 {
			margin: 0 0 0.5rem;
			font-size: 1.5rem;
			font-weight: 600;
			display: flex;
			align-items: center;
			gap: 0.5rem;
		}
		.channel-badge {
			font-size: 0.7rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			padding: 0.2rem 0.6rem;
			border-radius: 999px;
			font-weight: 600;
		}
		.release .channel-badge {
			background: rgba(99, 102, 241, 0.15);
			color: var(--accent);
		}
		.preview .channel-badge {
			background: rgba(245, 158, 11, 0.15);
			color: var(--accent-preview);
		}
		.channel-description {
			color: var(--text-muted);
			font-size: 0.95rem;
			margin: 0 0 1rem;
		}
		.version-info {
			font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
			font-size: 0.85rem;
			color: var(--text-muted);
			margin: 0 0 1.25rem;
			min-height: 1.2em;
		}
		.version-info strong {
			color: var(--text);
			font-weight: 600;
		}
		.platforms {
			display: flex;
			flex-direction: column;
			gap: 0.5rem;
		}
		.platform-btn {
			display: inline-flex;
			align-items: center;
			gap: 0.6rem;
			padding: 0.7rem 1rem;
			border-radius: 10px;
			font-size: 0.95rem;
			font-weight: 600;
			text-decoration: none;
			transition: background 0.15s, transform 0.1s, opacity 0.15s;
			color: white;
			background: var(--bg);
			border: 1px solid var(--border);
			color: var(--text);
			justify-content: space-between;
		}
		.platform-btn .platform-name {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
		}
		.platform-btn .platform-name svg {
			width: 18px;
			height: 18px;
			opacity: 0.8;
		}
		.platform-btn .platform-status {
			font-size: 0.75rem;
			font-weight: 500;
			color: var(--text-muted);
			text-transform: uppercase;
			letter-spacing: 0.05em;
		}
		.platform-btn.available {
			color: white;
		}
		.release .platform-btn.available { background: var(--accent); border-color: var(--accent); }
		.release .platform-btn.available:hover { background: var(--accent-hover); }
		.preview .platform-btn.available { background: var(--accent-preview); border-color: var(--accent-preview); }
		.preview .platform-btn.available:hover { background: var(--accent-preview-hover); }
		.platform-btn.available:active { transform: translateY(1px); }
		.platform-btn.available .platform-status { color: rgba(255,255,255,0.8); }
		.platform-btn.unavailable {
			opacity: 0.55;
			pointer-events: none;
			cursor: not-allowed;
		}
		.notes {
			margin-top: 1.5rem;
			padding-top: 1.25rem;
			border-top: 1px solid var(--border);
			font-size: 0.85rem;
			color: var(--text-muted);
			line-height: 1.55;
			max-height: 120px;
			overflow: hidden;
			position: relative;
			white-space: pre-wrap;
			word-break: break-word;
		}
		.notes:after {
			content: "";
			position: absolute;
			inset: auto 0 0 0;
			height: 30px;
			background: linear-gradient(transparent, var(--bg-card));
			pointer-events: none;
		}
		.notes:empty { display: none; }
		.gatekeeper-note {
			background: var(--bg-card);
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 1.25rem 1.5rem;
			font-size: 0.9rem;
			color: var(--text-muted);
			line-height: 1.55;
		}
		.gatekeeper-note strong { color: var(--text); }
		.gatekeeper-note code {
			background: var(--bg);
			padding: 0.15rem 0.4rem;
			border-radius: 4px;
			font-size: 0.85em;
		}
		.error { color: var(--error); font-style: italic; }
	</style>
</head>
<body>
	<main>
		<header>
			<img src="jmart-logo.png" alt="JMart" class="logo">
			<h1>JMart</h1>
			<p class="tagline">Build what you imagine — your local AI IDE.</p>
		</header>

		<div class="channels">
			<section class="channel preview" id="channel-preview">
				<h2>Preview <span class="channel-badge">Beta</span></h2>
				<p class="channel-description">Early build. New features arrive here first.</p>
				<p class="version-info" id="preview-info">Loading…</p>
				<div class="platforms" id="preview-platforms"></div>
				<div class="notes" id="preview-notes"></div>
			</section>
		</div>

		<div class="gatekeeper-note">
			<strong>macOS Gatekeeper:</strong> these builds are not yet Apple-notarized. On first launch you may see an "app is damaged" warning. To unblock once:
			<code>xattr -cr /Applications/JMart.app</code>
		</div>
	</main>

	<script>
		// SVG icons (inlined to avoid extra requests)
		const ICON = {
			"darwin-aarch64": `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>`,
			"darwin-x86_64": `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>`,
			"windows-x86_64": `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-13.051-1.351"/></svg>`,
			"linux-x86_64": `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.504.075c-.617 0-1.117.488-1.117 1.098 0 .15.03.292.085.422-.034.027-.067.057-.1.087-1.063-.4-2.196-.4-3.26 0-.033-.03-.066-.06-.1-.087.055-.13.085-.272.085-.422 0-.61-.5-1.098-1.117-1.098-.616 0-1.117.488-1.117 1.098 0 .443.27.823.65.99-.39.317-.748.7-1.054 1.143C5.5 3.79 5.2 4.31 5 4.86c-.41.013-.74.348-.74.758 0 .258.13.486.327.62-.087.42-.13.85-.13 1.282 0 .916.187 1.797.53 2.62.235.563.563 1.09.965 1.563l-.39.39c-.156.156-.156.41 0 .566s.41.156.566 0l.39-.39c.475.4 1 .73 1.564.964.823.343 1.703.53 2.62.53.916 0 1.797-.187 2.62-.53.564-.234 1.09-.563 1.564-.964l.39.39c.156.156.41.156.566 0s.156-.41 0-.566l-.39-.39c.402-.473.73-1 .965-1.563.343-.823.53-1.704.53-2.62 0-.432-.043-.862-.13-1.282.197-.134.327-.362.327-.62 0-.41-.33-.745-.74-.758-.2-.55-.5-1.07-.83-1.534-.306-.443-.664-.826-1.054-1.143.38-.167.65-.547.65-.99 0-.61-.5-1.098-1.117-1.098Z"/></svg>`,
		};

		const LABEL = {
			"darwin-aarch64": "macOS (Apple Silicon)",
			"darwin-x86_64": "macOS (Intel)",
			"windows-x86_64": "Windows (x64)",
			"linux-x86_64": "Linux (x64)",
		};

		// Order in which to render the platform buttons.
		const PLATFORM_ORDER = ["darwin-aarch64", "darwin-x86_64", "windows-x86_64", "linux-x86_64"];

		function formatDate(iso) {
			try {
				const d = new Date(iso);
				return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
			} catch { return ""; }
		}

		// Derive the user-facing .dmg/.msi/.AppImage URL from the manifest's .tar.gz URL.
		// .tar.gz is the auto-update bundle; users want the installer instead.
		function installerUrl(platformKey, tarUrl, version) {
			const baseDir = tarUrl.replace(/\/[^\/]+$/, "");
			if (platformKey === "darwin-aarch64") return `${baseDir}/JMart_${version}_aarch64.dmg`;
			if (platformKey === "darwin-x86_64") return `${baseDir}/JMart_${version}_x64.dmg`;
			if (platformKey === "windows-x86_64") return `${baseDir}/JMart_${version}_x64-setup.exe`;
			if (platformKey === "linux-x86_64") return `${baseDir}/JMart_${version}_amd64.AppImage`;
			return tarUrl;
		}

		async function loadChannel(id) {
			const info = document.getElementById(`${id}-info`);
			const platforms = document.getElementById(`${id}-platforms`);
			const notes = document.getElementById(`${id}-notes`);
			try {
				const res = await fetch(`${id}.json?t=${Date.now()}`, { cache: "no-store" });
				if (!res.ok) throw new Error(`HTTP ${res.status}`);
				const m = await res.json();
				const pl = m.platforms || {};

				info.innerHTML = `<strong>v${m.version}</strong> · ${formatDate(m.pub_date)}`;

				// Render every supported platform; the ones in the manifest are active,
				// the rest are "Coming soon".
				platforms.innerHTML = "";
				for (const key of PLATFORM_ORDER) {
					const cell = pl[key];
					const a = document.createElement("a");
					if (cell && cell.url) {
						a.className = "platform-btn available";
						a.href = installerUrl(key, cell.url, m.version);
						a.innerHTML = `<span class="platform-name">${ICON[key] || ""}${LABEL[key]}</span><span class="platform-status">Download</span>`;
					} else {
						a.className = "platform-btn unavailable";
						a.href = "#";
						a.innerHTML = `<span class="platform-name">${ICON[key] || ""}${LABEL[key]}</span><span class="platform-status">Coming soon</span>`;
					}
					platforms.appendChild(a);
				}

				notes.textContent = m.notes || "";
			} catch (err) {
				info.innerHTML = `<span class="error">Unavailable (${err.message})</span>`;
				platforms.innerHTML = "";
			}
		}

		// Release channel is hidden for now; only Preview is visible publicly.
		["preview"].forEach(loadChannel);
	</script>
</body>
</html>
